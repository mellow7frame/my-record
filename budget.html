<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #faf8f5; --surface: #ffffff; --surface2: #f5f2ee;
    --border: #e8e0d5; --accent: #c17f5a; --accent2: #8b6f5e;
    --text: #2d2420; --text2: #8b7e77; --up: #e05c5c; --down: #4a9e8a;
    --gold: #c17f5a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Noto Sans KR', sans-serif; color: var(--text); min-height: 100vh; }
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 80px; }

  .login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 40px 24px; text-align: center; }
  .login-icon { font-size: 48px; margin-bottom: 16px; }
  .login-title { font-family: 'Noto Serif KR', serif; font-size: 22px; color: var(--accent); margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--text2); line-height: 1.8; margin-bottom: 40px; }
  .google-btn { display: flex; align-items: center; gap: 12px; background: white; border: 1.5px solid var(--border); border-radius: 24px; padding: 14px 28px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; color: var(--text); cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.06); font-weight: 500; }
  .google-logo { width: 20px; height: 20px; }

  .header { padding: 24px 20px 16px; border-bottom: 1px solid var(--border); background: white; display: flex; align-items: center; justify-content: space-between; }
  .header-title { font-family: 'Noto Serif KR', serif; font-size: 20px; color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); }
  .logout-btn { background: none; border: 1px solid var(--border); border-radius: 10px; padding: 3px 10px; font-size: 11px; color: var(--text2); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }

  .month-bar { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 14px 20px; background: white; border-bottom: 1px solid var(--border); }
  .month-nav { background: none; border: 1px solid var(--border); border-radius: 8px; width: 32px; height: 32px; cursor: pointer; font-size: 16px; color: var(--text2); }
  .month-label { font-family: 'Noto Serif KR', serif; font-size: 16px; color: var(--text); font-weight: 700; min-width: 100px; text-align: center; }

  .tab-nav { display: flex; background: white; border-bottom: 1px solid var(--border); }
  .tab-btn { flex: 1; padding: 12px 4px; border: none; background: transparent; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; font-weight: 500; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .view { display: none; padding: 16px; }
  .view.active { display: block; }

  /* 섹션 카드 */
  .section-card { background: white; border-radius: 16px; padding: 18px; border: 1px solid var(--border); margin-bottom: 14px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .section-title { font-family: 'Noto Serif KR', serif; font-size: 14px; color: var(--accent); font-weight: 700; }
  .section-total { font-size: 13px; color: var(--text2); }
  .section-total span { color: var(--accent); font-weight: 700; }

  .item-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .item-row:last-child { border-bottom: none; }
  .item-left { display: flex; align-items: center; gap: 6px; flex: 1; }
  .item-name { font-size: 14px; color: var(--text); }
  .item-right { display: flex; align-items: center; gap: 6px; }
  .amount-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; color: var(--text); width: 130px; text-align: right; outline: none; }
  .amount-input:focus { border-color: var(--accent); }
  .amount-input::placeholder { color: var(--text2); font-size: 12px; }
  .won { font-size: 12px; color: var(--text2); white-space: nowrap; }
  textarea.memo-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; color: var(--text); resize: none; outline: none; min-height: 90px; line-height: 1.7; }
  textarea.memo-input:focus { border-color: var(--accent); }
  textarea.memo-input::placeholder { color: var(--text2); }

  /* 요약 바 */
  .summary-bar { background: white; border-radius: 16px; padding: 16px 18px; border: 1px solid var(--border); margin-bottom: 14px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; text-align: center; }
  .summary-item-label { font-size: 10px; color: var(--text2); margin-bottom: 4px; }
  .summary-item-val { font-size: 14px; font-weight: 700; }
  .val-income { color: var(--down); }
  .val-expense { color: var(--up); }
  .val-remain { color: var(--accent); }

  .save-btn { width: 100%; background: var(--accent); color: white; border: none; border-radius: 12px; padding: 14px; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }

  /* 통계 */
  .chart-card { background: white; border-radius: 16px; padding: 20px; border: 1px solid var(--border); margin-bottom: 14px; }
  .chart-title { font-size: 13px; color: var(--text2); font-weight: 700; letter-spacing: 1px; margin-bottom: 16px; }
  .chart-wrap { position: relative; height: 200px; }
  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .stat-row:last-child { border-bottom: none; }
  .stat-name { font-size: 13px; color: var(--text); }
  .stat-vals { display: flex; gap: 10px; align-items: center; }
  .stat-amount { font-size: 13px; font-weight: 500; }
  .vs-up { color: var(--up); font-size: 11px; }
  .vs-down { color: var(--down); font-size: 11px; }

  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .divider { height: 1px; background: var(--border); margin: 10px 0; }
  .add-item-btn { width: 100%; background: none; border: 1px dashed var(--border); border-radius: 8px; padding: 8px; font-family: 'Noto Sans KR', sans-serif; font-size: 12px; color: var(--text2); cursor: pointer; margin-top: 8px; }
  .del-btn { background: none; border: none; color: var(--border); cursor: pointer; font-size: 15px; padding: 0; line-height: 1; }
  .del-btn:hover { color: var(--up); }
  .edit-btn { background: none; border: none; color: var(--border); cursor: pointer; font-size: 13px; padding: 0; }
  .name-input-inline { background: var(--surface2); border: 1px solid var(--accent); border-radius: 6px; padding: 3px 8px; font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--text); width: 90px; outline: none; }
</style>
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-icon">💰</div>
  <div class="login-title">가계부</div>
  <div class="login-sub">매달 수입과 지출을 기록하고<br>통계로 한눈에 봐요.</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg class="google-logo" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Google로 시작하기
  </button>
</div>

<div id="mainApp" class="app" style="display:none;">
  <div class="header">
    <div class="header-title">가계부</div>
    <div class="header-right">
      <img class="user-avatar" id="userAvatar" src="" alt="" style="display:none;">
      <button class="logout-btn" onclick="signOut()">로그아웃</button>
    </div>
  </div>

  <div class="month-bar">
    <button class="month-nav" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="month-nav" onclick="changeMonth(1)">›</button>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" onclick="switchTab('record')">기록</button>
    <button class="tab-btn" onclick="switchTab('stats')">통계</button>
    <button class="tab-btn" onclick="switchTab('trend')">추이</button>
  </div>

  <!-- 기록 탭 -->
  <div class="view active" id="view-record">
    <!-- 요약 -->
    <div class="summary-bar" id="summaryBar">
      <div><div class="summary-item-label">총 수입</div><div class="summary-item-val val-income" id="sum-income">0</div></div>
      <div><div class="summary-item-label">총 지출</div><div class="summary-item-val val-expense" id="sum-expense">0</div></div>
      <div><div class="summary-item-label">잔액</div><div class="summary-item-val val-remain" id="sum-remain">0</div></div>
    </div>

    <!-- 수입 -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-title">💵 총 수입</div>
        <div class="section-total">합계 <span id="total-income">0</span>원</div>
      </div>
      <div class="item-row">
        <div class="item-left"><span class="item-name">가게 소득</span></div>
        <div class="item-right">
          <input class="amount-input" type="number" id="inc-shop" placeholder="0" oninput="updateSummary()">
          <span class="won">원</span>
        </div>
      </div>
      <div class="item-row">
        <div class="item-left"><span class="item-name">월세 소득</span></div>
        <div class="item-right">
          <input class="amount-input" type="number" id="inc-rent" placeholder="0" oninput="updateSummary()">
          <span class="won">원</span>
        </div>
      </div>
      <div id="extra-income-rows"></div>
      <button class="add-item-btn" onclick="addExtraIncome()">+ 수입 항목 추가</button>
    </div>

    <!-- 지출 -->
    <div class="section-card">
      <div class="section-header">
        <div class="section-title">💸 총 지출</div>
        <div class="section-total">합계 <span id="total-expense">0</span>원</div>
      </div>
      <div class="item-row">
        <div class="item-left"><span class="item-name">🍚 식비</span></div>
        <div class="item-right">
          <input class="amount-input" type="number" id="exp-food" placeholder="1,000,000" oninput="updateSummary()">
          <span class="won">원</span>
        </div>
      </div>
      <div class="item-row">
        <div class="item-left"><span class="item-name">월세</span></div>
        <div class="item-right">
          <input class="amount-input" type="number" id="exp-rent" placeholder="0" oninput="updateSummary()">
          <span class="won">원</span>
        </div>
      </div>
      <div class="item-row">
        <div class="item-left"><span class="item-name">보험료</span></div>
        <div class="item-right">
          <input class="amount-input" type="number" id="exp-insurance" placeholder="0" oninput="updateSummary()">
          <span class="won">원</span>
        </div>
      </div>
      <div class="item-row">
        <div class="item-left"><span class="item-name">가족계</span></div>
        <div class="item-right">
          <input class="amount-input" type="number" id="exp-family" placeholder="0" oninput="updateSummary()">
          <span class="won">원</span>
        </div>
      </div>
      <div class="item-row">
        <div class="item-left"><span class="item-name">용돈</span></div>
        <div class="item-right">
          <input class="amount-input" type="number" id="exp-allowance" placeholder="0" oninput="updateSummary()">
          <span class="won">원</span>
        </div>
      </div>
      <div class="item-row">
        <div class="item-left"><span class="item-name">병원비</span></div>
        <div class="item-right">
          <input class="amount-input" type="number" id="exp-medical" placeholder="0" oninput="updateSummary()">
          <span class="won">원</span>
        </div>
      </div>
      <div class="item-row">
        <div class="item-left"><span class="item-name">문화비</span></div>
        <div class="item-right">
          <input class="amount-input" type="number" id="exp-culture" placeholder="0" oninput="updateSummary()">
          <span class="won">원</span>
        </div>
      </div>
      <div class="item-row">
        <div class="item-left"><span class="item-name">대출상환 (아파트)</span></div>
        <div class="item-right">
          <input class="amount-input" type="number" id="exp-loan1" placeholder="0" oninput="updateSummary()">
          <span class="won">원</span>
        </div>
      </div>
      <div class="item-row">
        <div class="item-left"><span class="item-name">대출상환 (자동차)</span></div>
        <div class="item-right">
          <input class="amount-input" type="number" id="exp-loan2" placeholder="0" oninput="updateSummary()">
          <span class="won">원</span>
        </div>
      </div>
      <div class="divider"></div>
      <div class="item-row">
        <div class="item-left"><span class="item-name" style="color:var(--text2);">비고정 지출 합계</span></div>
        <div class="item-right">
          <input class="amount-input" type="number" id="exp-variable" placeholder="0" oninput="updateSummary()">
          <span class="won">원</span>
        </div>
      </div>
    </div>

    <!-- 비고정 메모 -->
    <div class="section-card">
      <div class="section-header" style="margin-bottom:10px;">
        <div class="section-title">📝 비고정 지출 내역</div>
      </div>
      <textarea class="memo-input" id="memo-variable" placeholder="비고정 지출 내용을 적어요&#10;예) 명절선물 200,000 / 병원 피부과 230,500..."></textarea>
    </div>

    <!-- 이달 메모 -->
    <div class="section-card">
      <div class="section-header" style="margin-bottom:10px;">
        <div class="section-title">🗒️ 이달 메모</div>
      </div>
      <textarea class="memo-input" id="memo-month" placeholder="이번 달 특이사항, 이슈 등을 적어요"></textarea>
    </div>

    <button class="save-btn" onclick="saveMonth()">이번 달 저장하기</button>
  </div>

  <!-- 통계 탭 -->
  <div class="view" id="view-stats">
    <div class="chart-card">
      <div class="chart-title">월별 총지출</div>
      <div class="chart-wrap"><canvas id="monthlyChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">이번 달 지출 비중</div>
      <div class="chart-wrap"><canvas id="pieChart"></canvas></div>
    </div>
  </div>

  <!-- 추이 탭 -->
  <div class="view" id="view-trend">
    <div class="chart-card">
      <div class="chart-title">전월 대비 증감</div>
      <div id="trendList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getFirestore, doc, setDoc, getDoc, getDocs, collection, query, where } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDBT7TGCQbi3TDXId_49_ZxS9__Jxm7yeY",
    authDomain: "my-recordmy.firebaseapp.com",
    projectId: "my-recordmy",
    storageBucket: "my-recordmy.firebasestorage.app",
    messagingSenderId: "631824484897",
    appId: "1:631824484897:web:8c3c86acd25a39144d7160"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;
  let curYear = new Date().getFullYear();
  let curMonth = new Date().getMonth() + 1;
  let allData = {};
  let extraIncomeItems = []; // 추가 수입 항목
  let monthlyChart = null;
  let pieChart = null;

  function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }
  function val(id) { return parseInt(document.getElementById(id)?.value || '0') || 0; }
  function monthKey(y, m) { y=y||curYear; m=m||curMonth; return `${y}-${String(m).padStart(2,'0')}`; }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  function updateMonthLabel() {
    document.getElementById('monthLabel').textContent = `${curYear}년 ${curMonth}월`;
  }

  window.updateSummary = () => {
    const income = val('inc-shop') + val('inc-rent') + extraIncomeItems.reduce((s,item) => s + (parseInt(document.getElementById('inc-extra-'+item.id)?.value||'0')||0), 0);
    const expense = val('exp-food') + val('exp-rent') + val('exp-insurance') + val('exp-family') +
      val('exp-allowance') + val('exp-medical') + val('exp-culture') + val('exp-loan1') + val('exp-loan2') + val('exp-variable');
    const remain = income - expense;
    document.getElementById('total-income').textContent = fmt(income);
    document.getElementById('total-expense').textContent = fmt(expense);
    document.getElementById('sum-income').textContent = fmt(income);
    document.getElementById('sum-expense').textContent = fmt(expense);
    document.getElementById('sum-remain').textContent = fmt(remain);
    document.getElementById('sum-remain').style.color = remain >= 0 ? 'var(--down)' : 'var(--up)';
  };

  window.addExtraIncome = () => {
    const id = Date.now();
    extraIncomeItems.push({ id, name: '기타 수입' });
    renderExtraIncome();
  };

  function renderExtraIncome() {
    const container = document.getElementById('extra-income-rows');
    container.innerHTML = extraIncomeItems.map(item => `
      <div class="item-row" id="extra-row-${item.id}">
        <div class="item-left">
          <span id="extra-name-${item.id}" class="item-name">${item.name}</span>
          <button class="edit-btn" onclick="editExtraName(${item.id})">✏️</button>
          <button class="del-btn" onclick="removeExtraIncome(${item.id})">×</button>
        </div>
        <div class="item-right">
          <input class="amount-input" type="number" id="inc-extra-${item.id}" placeholder="0" oninput="updateSummary()">
          <span class="won">원</span>
        </div>
      </div>
    `).join('');
  }

  window.editExtraName = (id) => {
    const span = document.getElementById(`extra-name-${id}`);
    const item = extraIncomeItems.find(i => i.id === id);
    span.outerHTML = `<input class="name-input-inline" id="extra-name-${id}" value="${item.name}" onblur="saveExtraName(${id},this.value)" onkeydown="if(event.key==='Enter')this.blur()">`;
    document.getElementById(`extra-name-${id}`).focus();
  };

  window.saveExtraName = (id, val) => {
    const item = extraIncomeItems.find(i => i.id === id);
    if (item && val.trim()) item.name = val.trim();
    renderExtraIncome();
  };

  window.removeExtraIncome = (id) => {
    extraIncomeItems = extraIncomeItems.filter(i => i.id !== id);
    renderExtraIncome();
    updateSummary();
  };

  window.signInWithGoogle = async () => {
    try { await signInWithPopup(auth, provider); }
    catch(e) { showToast('로그인 실패'); }
  };
  window.signOut = async () => { await fbSignOut(auth); };

  onAuthStateChanged(auth, async user => {
    if (user) {
      currentUser = user;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      const av = document.getElementById('userAvatar');
      if (user.photoURL) { av.src = user.photoURL; av.style.display = 'block'; }
      updateMonthLabel();
      await loadAllMonths();
      loadMonthToForm();
    } else {
      currentUser = null;
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('mainApp').style.display = 'none';
    }
  });

  async function loadAllMonths() {
    try {
      const q = query(collection(db, 'budget_v2'), where('uid','==',currentUser.uid));
      const snap = await getDocs(q);
      allData = {};
      snap.forEach(ds => { allData[ds.data().monthKey] = ds.data(); });
    } catch(e) {}
  }

  function loadMonthToForm() {
    const d = allData[monthKey()] || {};
    const setVal = (id, v) => { const el = document.getElementById(id); if(el) el.value = v || ''; };
    setVal('inc-shop', d.incShop);
    setVal('inc-rent', d.incRent);
    setVal('exp-food', d.expFood);
    setVal('exp-rent', d.expRent);
    setVal('exp-insurance', d.expInsurance);
    setVal('exp-family', d.expFamily);
    setVal('exp-allowance', d.expAllowance);
    setVal('exp-medical', d.expMedical);
    setVal('exp-culture', d.expCulture);
    setVal('exp-loan1', d.expLoan1);
    setVal('exp-loan2', d.expLoan2);
    setVal('exp-variable', d.expVariable);
    setVal('memo-variable', d.memoVariable);
    setVal('memo-month', d.memoMonth);
    extraIncomeItems = d.extraIncome || [];
    renderExtraIncome();
    // 추가 수입 값 복원
    if (d.extraIncomeValues) {
      extraIncomeItems.forEach(item => {
        const el = document.getElementById('inc-extra-'+item.id);
        if (el) el.value = d.extraIncomeValues[item.id] || '';
      });
    }
    updateSummary();
  }

  window.saveMonth = async () => {
    const extraIncomeValues = {};
    extraIncomeItems.forEach(item => {
      extraIncomeValues[item.id] = parseInt(document.getElementById('inc-extra-'+item.id)?.value||'0')||0;
    });
    const totalIncome = val('inc-shop') + val('inc-rent') + Object.values(extraIncomeValues).reduce((a,b)=>a+b,0);
    const totalExpense = val('exp-food') + val('exp-rent') + val('exp-insurance') + val('exp-family') +
      val('exp-allowance') + val('exp-medical') + val('exp-culture') + val('exp-loan1') + val('exp-loan2') + val('exp-variable');

    const data = {
      uid: currentUser.uid, monthKey: monthKey(), year: curYear, month: curMonth,
      incShop: val('inc-shop'), incRent: val('inc-rent'),
      expFood: val('exp-food'), expRent: val('exp-rent'), expInsurance: val('exp-insurance'),
      expFamily: val('exp-family'), expAllowance: val('exp-allowance'), expMedical: val('exp-medical'),
      expCulture: val('exp-culture'), expLoan1: val('exp-loan1'), expLoan2: val('exp-loan2'),
      expVariable: val('exp-variable'),
      memoVariable: document.getElementById('memo-variable').value,
      memoMonth: document.getElementById('memo-month').value,
      extraIncome: extraIncomeItems, extraIncomeValues,
      totalIncome, totalExpense, remain: totalIncome - totalExpense
    };
    try {
      await setDoc(doc(db, 'budget_v2', currentUser.uid+'_'+monthKey()), data);
      allData[monthKey()] = data;
      showToast(`${curYear}년 ${curMonth}월 저장됐어요 ✦`);
      updateSummary();
    } catch(e) { showToast('저장 오류: '+e.message); }
  };

  window.changeMonth = (dir) => {
    curMonth += dir;
    if (curMonth > 12) { curMonth = 1; curYear++; }
    if (curMonth < 1) { curMonth = 12; curYear--; }
    updateMonthLabel();
    const activeTab = document.querySelector('.tab-btn.active')?.textContent?.trim();
    if (activeTab === '기록') loadMonthToForm();
    else if (activeTab === '통계') renderStats();
    else renderTrend();
  };

  window.switchTab = (tab) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-'+tab).classList.add('active');
    event.target.classList.add('active');
    if (tab === 'record') loadMonthToForm();
    else if (tab === 'stats') renderStats();
    else renderTrend();
  };

  function renderStats() {
    const months = [];
    for (let i = 5; i >= 0; i--) {
      let m = curMonth - i; let y = curYear;
      while (m < 1) { m += 12; y--; }
      const k = monthKey(y, m);
      months.push({ label: `${m}월`, key: k, total: allData[k]?.totalExpense || 0 });
    }

    if (monthlyChart) monthlyChart.destroy();
    const ctx1 = document.getElementById('monthlyChart').getContext('2d');
    monthlyChart = new Chart(ctx1, {
      type: 'bar',
      data: {
        labels: months.map(m => m.label),
        datasets: [{ data: months.map(m => m.total), backgroundColor: months.map((_,i) => i===5?'#c17f5a':'#e8d5c0'), borderRadius: 6 }]
      },
      options: { plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => fmt(v/10000)+'만' } } } }
    });

    const d = allData[monthKey()] || {};
    const items = [
      { name: '식비', val: d.expFood||0 }, { name: '월세', val: d.expRent||0 },
      { name: '보험료', val: d.expInsurance||0 }, { name: '가족계', val: d.expFamily||0 },
      { name: '용돈', val: d.expAllowance||0 }, { name: '병원비', val: d.expMedical||0 },
      { name: '문화비', val: d.expCulture||0 }, { name: '대출(아파트)', val: d.expLoan1||0 },
      { name: '대출(자동차)', val: d.expLoan2||0 }, { name: '비고정', val: d.expVariable||0 }
    ].filter(i => i.val > 0);

    if (pieChart) pieChart.destroy();
    const ctx2 = document.getElementById('pieChart').getContext('2d');
    const colors = ['#c17f5a','#8b6f5e','#d4a574','#e8c09a','#6b8e7f','#4a9e8a','#e05c5c','#9b7fb6','#5b9bd5','#f0d5b8'];
    pieChart = new Chart(ctx2, {
      type: 'doughnut',
      data: { labels: items.map(i=>i.name), datasets: [{ data: items.map(i=>i.val), backgroundColor: colors.slice(0,items.length), borderWidth: 2, borderColor: '#faf8f5' }] },
      options: { plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 8 } } } }
    });
  }

  function renderTrend() {
    const cur = allData[monthKey()] || {};
    let prevM = curMonth-1; let prevY = curYear;
    if (prevM < 1) { prevM = 12; prevY--; }
    const prev = allData[monthKey(prevY,prevM)] || {};

    const items = [
      { name: '총수입', cur: cur.totalIncome||0, prev: prev.totalIncome||0 },
      { name: '총지출', cur: cur.totalExpense||0, prev: prev.totalExpense||0 },
      { name: '잔액', cur: cur.remain||0, prev: prev.remain||0 },
      { name: '─', divider: true },
      { name: '식비', cur: cur.expFood||0, prev: prev.expFood||0 },
      { name: '월세', cur: cur.expRent||0, prev: prev.expRent||0 },
      { name: '보험료', cur: cur.expInsurance||0, prev: prev.expInsurance||0 },
      { name: '가족계', cur: cur.expFamily||0, prev: prev.expFamily||0 },
      { name: '용돈', cur: cur.expAllowance||0, prev: prev.expAllowance||0 },
      { name: '병원비', cur: cur.expMedical||0, prev: prev.expMedical||0 },
      { name: '문화비', cur: cur.expCulture||0, prev: prev.expCulture||0 },
      { name: '대출(아파트)', cur: cur.expLoan1||0, prev: prev.expLoan1||0 },
      { name: '대출(자동차)', cur: cur.expLoan2||0, prev: prev.expLoan2||0 },
      { name: '비고정', cur: cur.expVariable||0, prev: prev.expVariable||0 },
    ];

    document.getElementById('trendList').innerHTML = items.map(item => {
      if (item.divider) return `<div style="border-top:1px dashed var(--border);margin:8px 0;"></div>`;
      const diff = item.cur - item.prev;
      const diffStr = diff === 0 ? '' : diff > 0
        ? `<span class="vs-up">▲${fmt(diff)}</span>`
        : `<span class="vs-down">▼${fmt(Math.abs(diff))}</span>`;
      return `<div class="stat-row">
        <span class="stat-name">${item.name}</span>
        <div class="stat-vals">
          <span class="stat-amount">${fmt(item.cur)}원</span>
          ${diffStr}
        </div>
      </div>`;
    }).join('');
  }
</script>
</body>
</html>
