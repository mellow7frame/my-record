<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오늘 내가 한 것들</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #faf6f0;
    --warm: #f5ede0;
    --paper: #fffdf8;
    --brown: #8b6f5e;
    --brown-dark: #5c4033;
    --brown-light: #c4a882;
    --accent: #c17f5a;
    --text: #3d2b1f;
    --text-light: #8b6f5e;
    --border: #e8d5c0;
    --shadow: rgba(139, 111, 94, 0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--cream);
    font-family: 'Nanum Gothic', sans-serif;
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(193,127,90,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(196,168,130,0.1) 0%, transparent 60%);
  }
  .app { max-width: 480px; margin: 0 auto; padding: 0 0 80px 0; min-height: 100vh; }

  /* Login */
  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 40px 24px;
    text-align: center;
  }
  .login-icon { font-size: 48px; margin-bottom: 20px; }
  .login-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 24px;
    color: var(--brown-dark);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .login-sub { font-size: 13px; color: var(--text-light); line-height: 1.8; margin-bottom: 40px; }
  .google-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 24px;
    padding: 14px 28px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 15px;
    color: var(--text);
    cursor: pointer;
    box-shadow: 0 2px 12px var(--shadow);
    transition: all 0.2s;
    font-weight: 700;
  }
  .google-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 20px var(--shadow); }
  .google-logo { width: 20px; height: 20px; }

  /* Header */
  .header { padding: 36px 24px 20px; text-align: center; position: relative; }
  .header::after {
    content: '';
    display: block;
    width: 40px;
    height: 2px;
    background: var(--brown-light);
    margin: 16px auto 0;
  }
  .header-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 22px;
    color: var(--brown-dark);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .header-date { font-size: 12px; color: var(--text-light); letter-spacing: 1px; }
  .header-user {
    position: absolute;
    right: 24px;
    top: 36px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
  }
  .logout-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-light);
    cursor: pointer;
    font-family: 'Nanum Gothic', sans-serif;
  }

  /* Tab Nav */
  .tab-nav {
    display: flex;
    margin: 0 24px 24px;
    background: var(--warm);
    border-radius: 12px;
    padding: 4px;
    border: 1px solid var(--border);
  }
  .tab-btn {
    flex: 1;
    padding: 9px;
    border: none;
    background: transparent;
    border-radius: 9px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 13px;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 700;
  }
  .tab-btn.active {
    background: var(--paper);
    color: var(--accent);
    box-shadow: 0 2px 8px var(--shadow);
  }

  /* Views */
  .view { display: none; padding: 0 24px; }
  .view.active { display: block; }

  /* Write */
  .today-card {
    background: var(--paper);
    border-radius: 16px;
    padding: 24px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px var(--shadow);
    margin-bottom: 20px;
  }
  .today-label {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 11px;
    color: var(--brown-light);
    letter-spacing: 2px;
    margin-bottom: 14px;
  }
  .memo-input {
    width: 100%;
    border: none;
    background: transparent;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 15px;
    color: var(--text);
    resize: none;
    outline: none;
    line-height: 1.7;
    min-height: 80px;
  }
  .memo-input::placeholder { color: var(--brown-light); }
  .input-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px dashed var(--border);
  }
  .stamp-hint { font-size: 11px; color: var(--brown-light); }
  .save-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 8px 20px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .save-btn:hover { background: var(--brown-dark); transform: translateY(-1px); }
  .section-label { font-size: 11px; color: var(--text-light); letter-spacing: 1.5px; margin-bottom: 12px; font-weight: 700; }
  .entry-item {
    background: var(--paper);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .entry-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); margin-top: 7px; flex-shrink: 0; }
  .entry-text { font-size: 14px; line-height: 1.6; color: var(--text); flex: 1; }
  .entry-delete { background: none; border: none; color: var(--border); cursor: pointer; font-size: 16px; line-height: 1; padding: 0; transition: color 0.2s; }
  .entry-delete:hover { color: var(--brown-light); }
  .empty-msg { text-align: center; padding: 30px; color: var(--brown-light); font-size: 13px; line-height: 1.8; }

  /* Calendar */
  .calendar-wrap {
    background: var(--paper);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: 0 4px 20px var(--shadow);
    margin-bottom: 20px;
  }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .cal-nav {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 14px;
    color: var(--brown);
    transition: all 0.2s;
  }
  .cal-nav:hover { background: var(--warm); }
  .cal-month { font-family: 'Nanum Myeongjo', serif; font-size: 16px; color: var(--brown-dark); letter-spacing: 1px; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-day-name { text-align: center; font-size: 10px; color: var(--text-light); padding: 4px 0 8px; font-weight: 700; letter-spacing: 0.5px; }
  .cal-day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    color: var(--text);
  }
  .cal-day:hover { background: var(--warm); }
  .cal-day.today { background: var(--accent); color: white; font-weight: 700; }
  .cal-day.has-entry::after {
    content: '';
    position: absolute;
    bottom: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--brown-light);
  }
  .cal-day.today.has-entry::after { background: rgba(255,255,255,0.7); }
  .cal-day.other-month { color: var(--border); cursor: default; }
  .cal-day.other-month:hover { background: transparent; }
  .cal-day.selected { background: var(--warm); border: 1px solid var(--accent); }
  .selected-date-label { font-family: 'Nanum Myeongjo', serif; font-size: 14px; color: var(--brown-dark); margin-bottom: 12px; padding-left: 4px; }

  /* Loading */
  .loading { text-align: center; padding: 20px; color: var(--brown-light); font-size: 13px; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--brown-dark);
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-screen">
  <div class="login-icon">🌿</div>
  <div class="login-title">오늘 내가 한 것들</div>
  <div class="login-sub">나를 기록하는 공간이에요.<br>어떤 기기에서도 내 기록을 볼 수 있어요.</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg class="google-logo" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Google로 시작하기
  </button>
</div>

<!-- Main App -->
<div id="mainApp" class="app" style="display:none;">
  <div class="header">
    <div class="header-title">오늘 내가 한 것들</div>
    <div class="header-date" id="headerDate"></div>
    <div class="header-user">
      <img class="user-avatar" id="userAvatar" src="" alt="" style="display:none;">
      <button class="logout-btn" onclick="signOut()">로그아웃</button>
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" id="tabWrite" onclick="switchTab('write')">오늘 기록</button>
    <button class="tab-btn" id="tabCal" onclick="switchTab('calendar')">달력 보기</button>
  </div>

  <div class="view active" id="view-write">
    <div class="today-card">
      <div class="today-label">오늘의 기록</div>
      <textarea class="memo-input" id="memoInput" placeholder="오늘 내가 한 것을 적어봐요.&#10;작은 것도 괜찮아요." rows="3"></textarea>
      <div class="input-footer">
        <span class="stamp-hint">내가 했다 ✦</span>
        <button class="save-btn" onclick="saveEntry()">기록하기</button>
      </div>
    </div>
    <div class="section-label">TODAY</div>
    <div id="todayEntries"><div class="loading">불러오는 중...</div></div>
  </div>

  <div class="view" id="view-calendar">
    <div class="calendar-wrap">
      <div class="cal-header">
        <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
        <div class="cal-month" id="calMonth"></div>
        <button class="cal-nav" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>
    <div class="selected-date-label" id="selectedDateLabel"></div>
    <div id="pastEntries"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, deleteDoc, doc, query, where, onSnapshot, orderBy }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDBT7TGCQbi3TDXId_49_ZxS9__Jxm7yeY",
    authDomain: "my-recordmy.firebaseapp.com",
    projectId: "my-recordmy",
    storageBucket: "my-recordmy.firebasestorage.app",
    messagingSenderId: "631824484897",
    appId: "1:631824484897:web:8c3c86acd25a39144d7160"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;
  let calYear = new Date().getFullYear();
  let calMonth = new Date().getMonth();
  let selectedDate = todayKey();
  let allEntries = {};
  let unsubscribe = null;

  function todayKey() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  function formatDateKo(dateStr) {
    const [y, m, d] = dateStr.split('-');
    return `${y}년 ${parseInt(m)}월 ${parseInt(d)}일`;
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // Auth
  window.signInWithGoogle = async () => {
    try { await signInWithPopup(auth, provider); }
    catch(e) { showToast('로그인 실패. 다시 시도해주세요.'); }
  };

  window.signOut = async () => {
    if(unsubscribe) unsubscribe();
    await fbSignOut(auth);
  };

  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'block';
      const avatar = document.getElementById('userAvatar');
      if (user.photoURL) { avatar.src = user.photoURL; avatar.style.display = 'block'; }
      updateHeaderDate();
      startListening();
    } else {
      currentUser = null;
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('mainApp').style.display = 'none';
      allEntries = {};
    }
  });

  function startListening() {
    if(unsubscribe) unsubscribe();
    const q = query(
      collection(db, 'entries'),
      where('uid', '==', currentUser.uid),
      orderBy('createdAt', 'asc')
    );
    unsubscribe = onSnapshot(q, snapshot => {
      allEntries = {};
      snapshot.forEach(docSnap => {
        const d = docSnap.data();
        if (!allEntries[d.date]) allEntries[d.date] = [];
        allEntries[d.date].push({ id: docSnap.id, text: d.text });
      });
      renderToday();
      if (document.getElementById('view-calendar').classList.contains('active')) {
        renderCalendar();
      }
    });
  }

  // Save
  window.saveEntry = async () => {
    const input = document.getElementById('memoInput');
    const text = input.value.trim();
    if (!text || !currentUser) return;
    input.value = '';
    try {
      await addDoc(collection(db, 'entries'), {
        uid: currentUser.uid,
        date: todayKey(),
        text,
        createdAt: new Date()
      });
      showToast('내가 했다 ✦');
    } catch(e) { showToast('저장 실패. 다시 시도해주세요.'); }
  };

  window.deleteEntry = async (id) => {
    try { await deleteDoc(doc(db, 'entries', id)); }
    catch(e) { showToast('삭제 실패.'); }
  };

  // Render
  function updateHeaderDate() {
    const d = new Date();
    const days = ['일','월','화','수','목','금','토'];
    document.getElementById('headerDate').textContent =
      `${d.getFullYear()}. ${d.getMonth()+1}. ${d.getDate()} ${days[d.getDay()]}요일`;
  }

  function renderToday() {
    const list = allEntries[todayKey()] || [];
    const container = document.getElementById('todayEntries');
    if (list.length === 0) {
      container.innerHTML = `<div class="empty-msg">아직 기록이 없어요.<br>오늘 내가 한 것을 적어봐요 🌿</div>`;
      return;
    }
    container.innerHTML = list.map(e => `
      <div class="entry-item">
        <div class="entry-dot"></div>
        <div class="entry-text">${e.text}</div>
        <button class="entry-delete" onclick="deleteEntry('${e.id}')">×</button>
      </div>
    `).join('');
  }

  window.switchTab = (tab) => {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('view-' + tab).classList.add('active');
    document.getElementById('tab' + (tab === 'write' ? 'Write' : 'Cal')).classList.add('active');
    if (tab === 'calendar') renderCalendar();
  };

  window.changeMonth = (dir) => {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0) { calMonth = 11; calYear--; }
    renderCalendar();
  };

  window.selectDate = (key) => {
    selectedDate = key;
    renderCalendar();
  };

  function renderCalendar() {
    const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    document.getElementById('calMonth').textContent = `${calYear}년 ${months[calMonth]}`;
    const grid = document.getElementById('calGrid');
    const days = ['일','월','화','수','목','금','토'];
    const today = todayKey();
    let html = days.map(d => `<div class="cal-day-name">${d}</div>`).join('');
    const first = new Date(calYear, calMonth, 1).getDay();
    const total = new Date(calYear, calMonth+1, 0).getDate();
    const prevTotal = new Date(calYear, calMonth, 0).getDate();
    for (let i = 0; i < first; i++) {
      html += `<div class="cal-day other-month">${prevTotal - first + i + 1}</div>`;
    }
    for (let d = 1; d <= total; d++) {
      const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = key === today;
      const hasEntry = allEntries[key] && allEntries[key].length > 0;
      const isSel = key === selectedDate;
      let cls = 'cal-day';
      if (isToday) cls += ' today';
      if (hasEntry) cls += ' has-entry';
      if (isSel && !isToday) cls += ' selected';
      html += `<div class="${cls}" onclick="selectDate('${key}')">${d}</div>`;
    }
    const remaining = 42 - first - total;
    for (let i = 1; i <= remaining; i++) {
      html += `<div class="cal-day other-month">${i}</div>`;
    }
    grid.innerHTML = html;
    renderPastEntries(selectedDate);
  }

  function renderPastEntries(key) {
    const list = allEntries[key] || [];
    document.getElementById('selectedDateLabel').textContent = formatDateKo(key);
    const container = document.getElementById('pastEntries');
    if (list.length === 0) {
      container.innerHTML = `<div class="empty-msg">이 날의 기록이 없어요.</div>`;
      return;
    }
    container.innerHTML = list.map(e => `
      <div class="entry-item">
        <div class="entry-dot"></div>
        <div class="entry-text">${e.text}</div>
        <button class="entry-delete" onclick="deleteEntry('${e.id}')">×</button>
      </div>
    `).join('');
  }

  // Enter key
  document.getElementById('memoInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); window.saveEntry(); }
  });
</script>
</body>
</html>
